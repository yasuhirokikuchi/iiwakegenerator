<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>言い訳ジェネレーター</title>
    <link rel="icon" type="image/png" href="/assets/icon.png" />
  </head>
  <body>
    <div class="playground">
      <header class="top-bar">
        <span class="breadcrumb">言い訳ジェネレーター</span>
      </header>

      <main class="playground-main">
        <section class="thread-panel is-initial" id="thread-panel">
          <div class="thread-header">
            <span class="thread-label">THREAD</span>
          </div>

          <div class="thread-body">
            <div
              class="chat-window"
              id="chat-window"
              role="log"
              aria-live="polite"
              aria-relevant="additions"
            >
              <div id="chat-empty-state" class="chat-empty-state">
                <p class="chat-empty-state-text">
                  断りたい内容を入力して「生成する」を押してください
                </p>
              </div>
            </div>

            <form id="excuse-form" class="composer" novalidate>
            <div class="composer-inner">
              <input
                type="text"
                id="event"
                name="event"
                class="composer-input"
                placeholder="断りたいこと（例：金曜日の飲み会）"
                autocomplete="off"
                aria-describedby="event-error"
              />
              <div class="composer-actions">
                <button
                  type="button"
                  id="settings-open-btn"
                  class="btn-settings"
                  aria-haspopup="dialog"
                  aria-controls="settings-modal"
                >
                  設定
                </button>
                <button type="submit" id="generate-btn" class="btn-run">
                  生成する
                </button>
              </div>
            </div>
            <p id="event-error" class="field-error composer-error" role="alert" hidden></p>
            </form>
          </div>
        </section>
      </main>
    </div>

    <div
      id="settings-modal"
      class="modal"
      hidden
      aria-hidden="true"
    >
      <div class="modal-backdrop" id="settings-backdrop"></div>
      <div
        class="modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settings-title"
      >
        <div class="modal-header">
          <div>
            <h2 id="settings-title" class="panel-title">設定</h2>
            <p class="panel-desc">テイストや文章の調整</p>
          </div>
          <button
            type="button"
            id="settings-close-btn"
            class="modal-close-btn"
            aria-label="閉じる"
          >
            ×
          </button>
        </div>

        <div class="modal-body">
          <div class="field">
            <label for="tone">テイスト</label>
            <select id="tone" name="tone" form="excuse-form">
              <option value="polite">丁寧</option>
              <option value="samurai">武士風</option>
              <option value="gal">ギャル風</option>
              <option value="business">意識高い系</option>
              <option value="chuuni">中二病風</option>
              <option value="grandma">ネコ語</option>
              <option value="yakuza">極道風</option>
              <option value="baby">赤ちゃん言葉</option>
              <option value="sexy">セクシー系</option>
              <option value="sage">おぢさん風</option>
            </select>
          </div>

          <div class="field">
            <label for="strength">
              強さ
              <span id="strength-label" class="strength-value">普通</span>
            </label>
            <div class="strength-slider">
              <span class="strength-end" aria-hidden="true">弱め</span>
              <input
                type="range"
                id="strength"
                name="strength"
                form="excuse-form"
                min="1"
                max="5"
                step="1"
                value="3"
                aria-describedby="strength-help"
              />
              <span class="strength-end" aria-hidden="true">強め</span>
            </div>
            <small id="strength-help" class="sr-only">
              1が弱め、5が強めです
            </small>
          </div>

          <div class="field">
            <label for="length">
              長さ
              <span id="length-label" class="strength-value">普通</span>
            </label>
            <div class="strength-slider">
              <span class="strength-end" aria-hidden="true">短め</span>
              <input
                type="range"
                id="length"
                name="length"
                form="excuse-form"
                min="1"
                max="5"
                step="1"
                value="3"
                aria-describedby="length-help"
              />
              <span class="strength-end" aria-hidden="true">長め</span>
            </div>
            <small id="length-help" class="sr-only">
              1が短め、5が長めです
            </small>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" id="settings-done-btn" class="btn-run">
            完了
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
